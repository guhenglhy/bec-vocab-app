<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
<title>BEC单词学习</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="appHeader">
    <div class="header-title">BEC单词学习</div>
    <button class="header-btn" id="settingsBtn" aria-label="设置">⚙️</button>
  </header>

  <!-- Main Content -->
  <main id="mainContent"></main>

  <!-- Bottom Navigation -->
  <nav id="bottomNav">
    <button class="nav-item active" data-view="learn">
      <span class="nav-icon">📖</span>
      <span class="nav-label">学习</span>
    </button>
    <button class="nav-item" data-view="quiz">
      <span class="nav-icon">✍️</span>
      <span class="nav-label">练习</span>
    </button>
    <button class="nav-item" data-view="review">
      <span class="nav-icon">📝</span>
      <span class="nav-label">复习</span>
    </button>
    <button class="nav-item" data-view="stats">
      <span class="nav-icon">📊</span>
      <span class="nav-label">统计</span>
    </button>
  </nav>
</div>

<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/srs.js"></script>
<script src="js/app.js"></script>
</body>
</html>
